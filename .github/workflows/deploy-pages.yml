name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - scripts/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate content.json
        run: node -e "JSON.parse(require('fs').readFileSync('docs/data/content.json', 'utf8'))"

      - name: Validate app.js
        run: node --check docs/scripts/app.js

      - name: Build resume PDFs
        run: node scripts/build-resumes.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
